<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .header {
            width: 100%;
            background-color: beige;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(35, 35, 35);
        }
        .container {
            padding: 20px;
        }

        input {
            margin: 5px 0;
            padding: 8px;
            width: 250px;
            text-align: left;
        }
        .btnpsn {
            padding: 8px 15px;
            margin-top: 10px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        .btnbtl {
            padding: 8px 15px;
            margin-top: 10px;
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
        }
        .btnreset {
            padding: 8px 10px;
            margin-top: 10px;
            background-color: rgb(66, 66, 66);
            color: white;
            border: 2px;
            cursor: pointer;
        }
        #hasil {
            margin-top: 15px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            line-height: 1.6;
            text-align: center;
        }
        body {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Toserba</h1>
    </div>
    <div>
        <input type="text" id="namaPelanggan" placeholder="Nama Pelanggan"> <br>
        <input type="text" id="namaProduk" placeholder="Nama Produk"> <br>
        <input type="text" id="hargaProduk" placeholder="Harga Produk"> <br>
        <input type="text" id="jumlahPembelian" placeholder="Jumlah Pembelian"> <br>

        <button class="btnpsn" onclick="pesan()">Pesan</button>
        <button class="btnbtl" onclick="batal()">Batal</button>
        <button class="btnreset" onclick="reset()">Kosongkan</button>
    </div>
    <script src="script.js"></script>
    <div id="hasil"></div>
</body>
</html>

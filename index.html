<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toserba</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
        }

        .header {
            background-color: beige;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            color: #333;
        }

        .container {
            width: 300px;
            margin: 30px auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            padding: 8px 12px;
            border: none;
            color: white;
            cursor: pointer;
            margin: 3px;
        }

        .btnpsn {
            background-color: green;
        }

        .btnbtl {
            background-color: red;
        }

        .btnreset {
            background-color: #555;
        }

        #hasil {
            width: 300px;
            margin: 20px auto;
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Toserba</h1>
    </div>

    <div class="container">
        <input type="text" id="namaPelanggan" placeholder="Nama Pelanggan">
        <input type="text" id="namaProduk" placeholder="Nama Produk">
        <input type="text" id="hargaProduk" placeholder="Harga Produk">
        <input type="text" id="jumlahPembelian" placeholder="Jumlah Pembelian">

        <button class="btnpsn" onclick="pesan()">Pesan</button>
        <button class="btnbtl" onclick="batal()">Batal</button>
        <button class="btnreset" onclick="reset()">Kosongkan</button>
    </div>

    <div id="hasil"></div>

    <script src="script.js"></script>

</body>
</html>
